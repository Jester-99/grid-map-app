<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW1-1: Grid Map Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --cell-bg: #1e293b;
            --cell-border: #334155;
            --cell-hover: #475569;

            --start-color: #10b981;
            /* Emerald / Green */
            --end-color: #ef4444;
            /* Red */
            --obstacle-color: #64748b;
            /* Slate / Grey */
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-weight: 800;
            font-size: 2.2rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 24px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            flex-wrap: wrap;
        }

        label {
            font-weight: 600;
            color: var(--text-muted);
        }

        input[type="number"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--cell-border);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 60px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--cell-border);
            color: var(--text-main);
            box-shadow: none;
            margin-left: auto;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title-info {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status {
            font-size: 0.9rem;
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .instructions {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .grid-wrapper {
            display: flex;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            min-height: 250px;
        }

        .grid {
            display: grid;
            gap: 8px;
            perspective: 1000px;
        }

        .cell {
            width: 50px;
            height: 50px;
            background-color: var(--cell-bg);
            border: 1px solid var(--cell-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
        }

        .cell:hover {
            background-color: var(--cell-hover);
            transform: scale(1.05) translateZ(10px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            z-index: 10;
            color: white;
            border-color: #64748b;
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.start {
            background-color: var(--start-color);
            color: white;
            border-color: #059669;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            transform: translateZ(5px);
        }

        .cell.end {
            background-color: var(--end-color);
            color: white;
            border-color: #dc2626;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            transform: translateZ(5px);
        }

        .cell.obstacle {
            background-color: var(--obstacle-color);
            color: white;
            border-color: #475569;
            transform: translateZ(-5px);
            opacity: 0.9;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.4);
        }

        .cell.start:hover,
        .cell.end:hover,
        .cell.obstacle:hover {
            transform: scale(1.05) translateZ(15px);
        }

        @keyframes pop {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
            }
        }

        .cell.start,
        .cell.end,
        .cell.obstacle {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast svg {
            width: 20px;
            height: 20px;
        }

        .toast.show {
            bottom: 30px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container" style="animation: fadeIn 0.6s ease-out;">
        <h1>HW1-1: Grid Map App</h1>

        <div class="controls">
            <label for="gridSize">Grid Dimension (5-9):</label>
            <input type="number" id="gridSize" min="5" max="9" value="5">
            <button class="btn" onclick="generateGrid()">Generate Square</button>
            <button class="btn btn-outline" onclick="resetGrid()">Reset Tiles</button>
        </div>

        <div class="header-content">
            <div class="title-info" id="gridTitle">5 x 5 Square:</div>
            <div class="status" id="statusText">
                <span style="color: var(--obstacle-color);">■</span> Obstacles: <b id="obsCount">0</b> / <span
                    id="obsMax">3</span>
            </div>
        </div>

        <div class="instructions">
            <strong>Action Steps:</strong> Click on a cell to assign its role. Unselect by clicking again.
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--start-color);"></div> Start (1st click)
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--end-color);"></div> End (2nd click)
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--obstacle-color);"></div> Obstacle (n-2 max)
                </div>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="gridContainer"></div>
        </div>
    </div>

    <!-- Error Toast Notification -->
    <div id="toast" class="toast">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span id="toastMsg">Limit reached!</span>
    </div>

    <script>
        let maxObstacles = 0;
        let startSet = false;
        let endSet = false;
        let obstacleCount = 0;
        let currentN = 5;
        let toastTimeout;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function updateStatus() {
            document.getElementById('obsCount').innerText = obstacleCount;
            document.getElementById('obsMax').innerText = maxObstacles;
        }

        function resetGrid() {
            startSet = false;
            endSet = false;
            obstacleCount = 0;
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.className = 'cell';
                // Trigger reflow to clear animation state completely
                void cell.offsetWidth;
                cell.style.animation = null;
            });
            updateStatus();
        }

        function generateGrid() {
            const sizeInput = document.getElementById('gridSize').value;
            let n = parseInt(sizeInput);

            if (isNaN(n) || n < 5 || n > 9) {
                showToast("Please enter a valid dimension between 5 and 9.");
                n = Math.max(5, Math.min(9, isNaN(n) ? 5 : n));
                document.getElementById('gridSize').value = n;
            }

            currentN = n;
            const gridContainer = document.getElementById('gridContainer');
            gridContainer.innerHTML = '';

            gridContainer.style.gridTemplateColumns = `repeat(${n}, 50px)`;

            document.getElementById('gridTitle').innerText = `${n} x ${n} Square:`;

            // Reset state
            startSet = false;
            endSet = false;
            obstacleCount = 0;
            maxObstacles = n - 2;
            updateStatus();

            let cellNumber = 1;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.innerText = cellNumber;
                    cell.dataset.number = cellNumber;

                    // Add staggered animation delay for initial render
                    cell.style.animation = `fadeIn 0.4s ease backwards ${(i + j) * 0.04}s`;

                    cell.onclick = () => handleCellClick(cell);
                    gridContainer.appendChild(cell);
                    cellNumber++;
                }
            }
        }

        function playPopAnimation(cell) {
            cell.style.animation = 'none';
            void cell.offsetWidth; // Force reflow
            cell.style.animation = 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
        }

        function handleCellClick(cell) {
            // Remove state if clicking already active cell
            if (cell.classList.contains('start')) {
                cell.classList.remove('start');
                startSet = false;
                cell.style.animation = 'none';
                return;
            }
            if (cell.classList.contains('end')) {
                cell.classList.remove('end');
                endSet = false;
                cell.style.animation = 'none';
                return;
            }
            if (cell.classList.contains('obstacle')) {
                cell.classList.remove('obstacle');
                obstacleCount--;
                updateStatus();
                cell.style.animation = 'none';
                return;
            }

            // Assign new state
            if (!startSet) {
                cell.classList.add('start');
                startSet = true;
                playPopAnimation(cell);
            } else if (!endSet) {
                cell.classList.add('end');
                endSet = true;
                playPopAnimation(cell);
            } else if (obstacleCount < maxObstacles) {
                cell.classList.add('obstacle');
                obstacleCount++;
                updateStatus();
                playPopAnimation(cell);
            } else {
                showToast(`Limit reached: Maximum ${maxObstacles} obstacles for ${currentN}x${currentN}.`);
            }
        }

        // Initialize grid on load
        generateGrid();
    </script>
</body>

</html>
